<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
  <!-- Frame top -->
  <line x1="2" y1="3" x2="22" y2="3" stroke="#333"/>
  <!-- Left post -->
  <line x1="3" y1="3" x2="3" y2="22" stroke="#333"/>
  <!-- Right post -->
  <line x1="21" y1="3" x2="21" y2="22" stroke="#333"/>
  <!-- Weight stack -->
  <rect x="16" y="5" width="4" height="12" rx="1" fill="#222" stroke="#333"/>
  <line x1="16" y1="8" x2="20" y2="8" stroke="#fff" stroke-width="1"/>
  <line x1="16" y1="11" x2="20" y2="11" stroke="#fff" stroke-width="1"/>
  <line x1="16" y1="14" x2="20" y2="14" stroke="#fff" stroke-width="1"/>
  <!-- Top pulley -->
  <circle cx="12" cy="3.5" r="1.5" fill="#222" stroke="#333"/>
  <!-- Cable -->
  <line x1="12" y1="5" x2="12" y2="11" stroke="#fff" stroke-width="1.5"/>
  <!-- Pulldown bar -->
  <line x1="5" y1="11" x2="19" y2="11" stroke="#fff" stroke-width="2"/>
  <!-- Seat -->
  <rect x="7" y="17" width="8" height="2.5" rx="1" fill="#222" stroke="#333"/>
  <!-- Leg pad -->
  <line x1="10" y1="19.5" x2="10" y2="22" stroke="#333"/>
  <line x1="14" y1="19.5" x2="14" y2="21" stroke="#333"/>
  <line x1="9" y1="21.5" x2="15" y2="21.5" stroke="#333"/>
</svg>
