<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
  <!-- Frame vertical -->
  <line x1="4" y1="2" x2="4" y2="22" stroke="#333"/>
  <line x1="20" y1="2" x2="20" y2="22" stroke="#333"/>
  <!-- Frame top -->
  <line x1="4" y1="2" x2="20" y2="2" stroke="#333"/>
  <!-- Weight stack -->
  <rect x="14" y="4" width="5" height="13" rx="1" fill="#222" stroke="#333"/>
  <line x1="14" y1="7" x2="19" y2="7" stroke="#fff" stroke-width="1"/>
  <line x1="14" y1="10" x2="19" y2="10" stroke="#fff" stroke-width="1"/>
  <line x1="14" y1="13" x2="19" y2="13" stroke="#fff" stroke-width="1"/>
  <!-- Top pulley -->
  <circle cx="12" cy="3" r="1.5" fill="#222" stroke="#333"/>
  <!-- Cable -->
  <line x1="12" y1="4.5" x2="8" y2="14" stroke="#fff" stroke-width="1.5"/>
  <!-- Handle -->
  <rect x="6" y="14" width="4" height="2" rx="1" fill="#222" stroke="#333"/>
  <!-- Base -->
  <line x1="2" y1="22" x2="22" y2="22" stroke="#333" stroke-width="1.5"/>
</svg>
